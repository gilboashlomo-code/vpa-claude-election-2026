<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPA - הצבעה</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container { 
      background: white; 
      border-radius: 20px; 
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      text-align: center;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: right;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }
    .form-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      text-align: right;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
    }
    .status.tracking {
      background: #dbeafe;
      color: #1e40af;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
    }
    .distance {
      font-size: 24px;
      font-weight: 700;
      margin: 20px 0;
      color: #667eea;
    }
    .hidden {
      display: none;
    }
    .message-box {
      margin-top: 20px;
      padding: 20px;
      background: #f3f4f6;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🗳️</div>
    <h1>מערכת הצבעה VPA</h1>
    <p class="subtitle">ברוכים הבאים למערכת המעקב</p>
    
    <div id="registrationForm">
      <form id="voterForm">
        <div class="form-group">
          <label>שם מלא *</label>
          <input type="text" id="voterName" required placeholder="הכנס שם מלא">
        </div>
        <div class="form-group">
          <label>מספר ת.ז *</label>
          <input type="text" id="voterIdNumber" required placeholder="הכנס ת.ז" maxlength="9">
        </div>
        <button type="submit" class="btn" id="submitBtn">
          📍 הצטרף והפעל מעקב מיקום
        </button>
      </form>
    </div>
    
    <div id="trackingStatus" class="hidden">
      <div class="status tracking">
        <div>📡 מעקב פעיל</div>
        <div style="margin-top: 10px; font-size: 14px;">המערכת עוקבת אחרי המיקום שלך</div>
      </div>
      
      <div class="distance" id="distanceDisplay">
        מחשב מרחק...
      </div>
      
      <div id="pollInfo" style="color: #6b7280; font-size: 14px;">
      </div>
    </div>
    
    <div id="successMessage" class="hidden">
      <div class="status success">
        <div style="font-size: 48px; margin-bottom: 10px;">✅</div>
        <div style="font-size: 24px;">הצבעה נרשמה בהצלחה!</div>
        <div style="margin-top: 10px; font-size: 14px;">תודה שהשתתפת</div>
      </div>
      
      <div id="messageBox" class="message-box">
        <h3 style="color: #1f2937; margin-bottom: 10px;">תודה שהצבעת!</h3>
        <p style="color: #6b7280;">למידע נוסף, בקר באתר המרצה:</p>
        <a href="https://example.com" target="_blank" style="color: #667eea; font-weight: 600; font-size: 18px;">לחץ כאן למידע נוסף</a>
      </div>
    </div>
  </div>
  
  <audio id="alertSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwPUKbk77FgGwU7k9jyyHgpBSl+zPDbj0AKElyw6OyrWBUIQ5zd8r1pHgUsgs/y14k1CBpqvfDjm0wMDlCl5O+wYBwGOpPY8sh4KQUpf8zx3I9AChJcr+jqrFgVCEKc3fK8aB4FLIHu8tiJNQgaaL3v45tMDA9QpuvwrmkdBjqT2PLIeCkFKX/M8dyPQAoSXK/o6qxYFQhCnN3yvGgeBSyB7vLYiTUIG2m98OOaTgwOUKbk8LJoHQY5k9jxyHkqBSh+zPHcj0AKElyw6OusWBUIQ53e8r1pHgUrge/y2Ik1CBpovfDjm0wMD1Cm5PCyaB0GOZPm8sp5KQUofsrw3I9AChJcr+jqrFgVCEOd3vK9aR4FK4Hv8tiJNQgaaL3w45tMDA9Qpuvwrmkd=" type="audio/wav">
  </audio>
  
  <script>
    let watchId = null;
    let voterId = null;
    let nearestPoll = null;
    let hasVoted = false;
    let lastDistance = null;
    
    function vibrate() {
      if ('vibrate' in navigator) {
        navigator.vibrate([200, 100, 200, 100, 200, 100, 200]);
      }
    }
    
    function playAlert() {
      const audio = document.getElementById('alertSound');
      audio.play().catch(e => console.log('Audio play failed:', e));
    }
    
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      
      const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ/2) * Math.sin(Δλ/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      
      return R * c;
    }
    
    async function findNearestPoll(lat, lng) {
      try {
        const res = await fetch('/api/admin/data');
        const data = await res.json();
        
        if (data.polls.length === 0) return null;
        
        let nearest = null;
        let minDistance = Infinity;
        
        data.polls.forEach(poll => {
          const distance = calculateDistance(
            lat, lng,
            parseFloat(poll.lat), parseFloat(poll.lng)
          );
          
          if (distance < minDistance) {
            minDistance = distance;
            nearest = { ...poll, distance };
          }
        });
        
        return nearest;
      } catch (e) {
        console.error('Error:', e);
        return null;
      }
    }
    
    async function markAsVoted() {
      if (hasVoted || !voterId) return;
      
      try {
        const res = await fetch('/api/admin/voters/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: voterId, voted: true })
        });
        
        if (res.ok) {
          hasVoted = true;
          showSuccessMessage();
        }
      } catch (e) {
        console.error('Error:', e);
      }
    }
    
    function showSuccessMessage() {
      document.getElementById('trackingStatus').classList.add('hidden');
      document.getElementById('successMessage').classList.remove('hidden');
      
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
      }
      
      playAlert();
      vibrate();
    }
    
    function trackPosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      
      findNearestPoll(lat, lng).then(poll => {
        if (!poll) {
          document.getElementById('distanceDisplay').textContent = 'לא נמצאו קלפיות';
          return;
        }
        
        nearestPoll = poll;
        const distance = poll.distance;
        
        document.getElementById('distanceDisplay').textContent = 
          `${Math.round(distance)} מטר מהקלפי`;
        
        document.getElementById('pollInfo').textContent = 
          `קלפי הכי קרובה: ${poll.name}`;
        
        const pollRadius = poll.radius || 20;
        if (distance <= pollRadius && !hasVoted) {
          if (lastDistance === null || lastDistance > pollRadius) {
            markAsVoted();
          }
        }
        
        lastDistance = distance;
      });
    }
    
    document.getElementById('voterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('voterName').value;
      const idNumber = document.getElementById('voterIdNumber').value;
      
      if (!name || !idNumber) {
        alert('אנא מלא את כל השדות');
        return;
      }
      
      if (!navigator.geolocation) {
        alert('הדפדפן שלך לא תומך במיקום GPS');
        return;
      }
      
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').textContent = 'מאתר מיקום...';
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          const poll = await findNearestPoll(lat, lng);
          
          if (!poll) {
            alert('לא נמצאו קלפיות במערכת');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '📍 הצטרף והפעל מעקב מיקום';
            return;
          }
          
          try {
            const res = await fetch('/api/admin/voters/add', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, idNumber, pollId: poll.id })
            });
            
            const data = await res.json();
            
            if (data.success) {
              voterId = data.voter.id;
              
              document.getElementById('registrationForm').classList.add('hidden');
              document.getElementById('trackingStatus').classList.remove('hidden');
              
              watchId = navigator.geolocation.watchPosition(
                trackPosition,
                (error) => {
                  console.error('GPS error:', error);
                  alert('שגיאה בקבלת מיקום');
                },
                {
                  enableHighAccuracy: true,
                  maximumAge: 5000,
                  timeout: 10000
                }
              );
            } else {
              alert('שגיאה ברישום');
              document.getElementById('submitBtn').disabled = false;
              document.getElementById('submitBtn').textContent = '📍 הצטרף והפעל מעקב מיקום';
            }
          } catch (e) {
            alert('שגיאה בחיבור לשרת');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '📍 הצטרף והפעל מעקב מיקום';
          }
        },
        (error) => {
          alert('לא ניתן לקבל מיקום. אנא אפשר גישה למיקום בהגדרות הדפדפן.');
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('submitBtn').textContent = '📍 הצטרף והפעל מעקב מיקום';
        }
      );
    });
  </script>
</body>
</html>
