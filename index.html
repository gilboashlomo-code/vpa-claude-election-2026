<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>הסקר של המדינה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --indigo:#4f46e5;--indigo-light:#818cf8;--indigo-dark:#3730a3;
    --lime:#d4f542;--lime-dark:#a3e635;
    --cyan:#22d3ee;--purple:#c084fc;--yellow:#facc15;
    --bg:#0d0a2e;--card:#ffffff0f;--border:#ffffff18;
  }
  html,body{background:var(--bg);color:#fff;font-family:'Heebo',sans-serif;min-height:100vh}
  body{display:flex;justify-content:center}
  #app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
  .sc{animation:si .3s cubic-bezier(.22,1,.36,1) both}
  @keyframes si{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}

  .hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:11px 16px 10px;background:rgba(13,10,46,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
  .hdr-logo{background:var(--indigo-dark);border:1px solid var(--indigo);border-radius:9px;padding:4px 9px;font-size:12px;font-weight:900;color:#c7d2fe}
  .hdr-live{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.3);border-radius:99px;padding:3px 11px}
  .hdr-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pu 1.4s infinite}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
  .hdr-cnt{font-size:12px;font-weight:900;color:#86efac}
  .prog-wrap{height:3px;background:rgba(255,255,255,.08)}
  .prog-fill{height:100%;background:linear-gradient(to left,var(--yellow),var(--lime),var(--cyan));transition:width .45s ease}

  /* LANDING */
  .land{background:linear-gradient(160deg,#1a0f4f 0%,#0d0a2e 45%,#0a1535 100%);padding:20px 16px 24px;position:relative;overflow:hidden}
  .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .cd{position:absolute;border-radius:2px;animation:cf linear infinite}
  @keyframes cf{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(900px) rotate(900deg);opacity:0}}
  .land-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .land-logo-box{background:#3730a3;border:1px solid #6366f1;border-radius:10px;padding:5px 11px;display:flex;align-items:center;gap:6px}
  .land-logo-txt{font-size:13px;font-weight:900;color:#c7d2fe}
  .land-logo-sub{font-size:10px;font-weight:700;color:#a5b4fc}
  .live-pill{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.3);border-radius:99px;padding:4px 11px}
  .live-pill-num{font-size:13px;font-weight:900;color:#86efac}
  .live-pill-lbl{font-size:9px;color:rgba(255,255,255,.75)}
  .land-headline{font-size:44px;font-weight:900;line-height:1.0;margin-bottom:12px}
  .land-headline .wh{color:#fff}
  .land-headline .yw{color:var(--lime)}
  .land-tagline{font-size:14px;color:rgba(255,255,255,.8);font-weight:700;margin-bottom:3px}
  .land-tagline2{font-size:13px;color:var(--lime);font-weight:900;margin-bottom:20px}
  .phone{background:linear-gradient(160deg,#1e1b4b,#0f0e2a);border:2px solid rgba(99,102,241,.5);border-radius:26px;padding:14px 13px;margin-bottom:18px}
  .phone-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .live-badge{background:#ef4444;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:900;display:flex;align-items:center;gap:4px}
  .live-badge-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:pu 1s infinite}
  .phone-pnum{font-size:19px;font-weight:900;color:#a5f3fc;line-height:1}
  .phone-plbl{font-size:9px;color:rgba(255,255,255,.72)}
  .pbar{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .pbar-name{font-size:11px;font-weight:700;width:82px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pbar-track{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
  .pbar-fill{height:100%;border-radius:99px}
  .pbar-num{font-size:11px;font-weight:900;width:22px;flex-shrink:0;color:rgba(255,255,255,.75)}
  .phone-footer{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
  .gauge-num{font-size:34px;font-weight:900;color:var(--lime-dark);line-height:1}
  .gauge-lbl{font-size:10px;color:rgba(255,255,255,.72);margin-top:2px}
  .feats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
  .feat{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:13px;padding:10px 6px;text-align:center}
  .feat-icon{font-size:20px;margin-bottom:5px}
  .feat-main{font-size:11px;font-weight:900;color:rgba(255,255,255,.9);line-height:1.3}
  .feat-sub{font-size:9px;color:rgba(255,255,255,.72);margin-top:2px}
  .cta{width:100%;padding:17px;border-radius:14px;background:var(--lime);color:#0f1a00;font-size:21px;font-weight:900;border:none;cursor:pointer;margin-bottom:13px;transition:transform .15s;letter-spacing:.2px;font-family:inherit}
  .cta:active{transform:scale(.98)}
  .social-proof{display:flex;align-items:center;justify-content:center;gap:9px;font-size:12px;color:rgba(255,255,255,.55);margin-bottom:20px}
  .avatars{display:flex}
  .av{width:25px;height:25px;border-radius:50%;border:2px solid var(--bg);margin-left:-7px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .prizes{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.28);border-radius:18px;padding:14px 13px;margin-bottom:18px}
  .prizes-title{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:900;color:#c7d2fe;margin-bottom:13px}
  .prizes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .prize{background:rgba(0,0,0,.3);border:1px solid rgba(99,102,241,.22);border-radius:13px;padding:12px 8px;text-align:center}
  .prize-em{font-size:30px;margin-bottom:6px}
  .prize-name{font-size:12px;font-weight:900;color:#e0e7ff;margin-bottom:2px}
  .prize-place{font-size:10px;color:rgba(255,255,255,.72)}
  .how{margin-bottom:18px}
  .how-title{font-size:15px;font-weight:900;text-align:center;color:#e0e7ff;margin-bottom:14px}
  .how-row{display:flex;align-items:flex-start;gap:4px}
  .how-step{flex:1;text-align:center}
  .how-icon{width:50px;height:50px;border-radius:50%;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .how-lbl{font-size:10px;font-weight:900;color:rgba(255,255,255,.85);line-height:1.4}
  .how-arr{font-size:16px;color:rgba(255,255,255,.6);margin-top:13px;flex-shrink:0}
  .trust{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:13px 15px}
  .trust-left{display:flex;align-items:center;gap:9px}
  .trust-txt{font-size:11px;line-height:1.55;color:rgba(255,255,255,.65)}
  .trust-right{text-align:left}
  .stars{color:#fbbf24;font-size:14px;letter-spacing:1px}
  .rating{font-size:19px;font-weight:900;color:#fbbf24;line-height:1}
  .rating-lbl{font-size:9px;color:rgba(255,255,255,.72);margin-top:2px}

  /* OTHER SCREENS */
  .spage{padding:16px 16px 28px}
  .pill{display:inline-block;border-radius:99px;padding:4px 15px;font-size:11px;font-weight:900;margin-bottom:11px}
  .pill-g{background:var(--lime-dark);color:#0f2000}
  .pill-c{background:var(--cyan);color:#001a1f}
  .pill-y{background:var(--yellow);color:#1a1000}
  .pill-f{background:var(--purple);color:#1a0030}
  .sh2{font-size:26px;font-weight:900;line-height:1.2;margin-bottom:7px}
  .ssub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:15px;line-height:1.6}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px 16px;margin-bottom:10px}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .pcard{border-radius:14px;border:1px solid var(--border);background:var(--card);color:#fff;font-size:12px;font-weight:900;padding:13px 9px;min-height:64px;text-align:right;line-height:1.4;cursor:pointer;width:100%;transition:all .15s;font-family:inherit}
  .pcard:hover{background:rgba(255,255,255,.12)}
  .pcard.on{background:var(--yellow);border-color:var(--yellow);color:#1a1000}
  .flbl{font-size:14px;font-weight:900;color:rgba(255,255,255,.9);margin-bottom:7px;display:block;margin-top:13px}
  .flbl:first-child{margin-top:0}
  .chip{border-radius:99px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-size:12px;font-weight:900;padding:7px 13px;cursor:pointer;transition:all .15s;font-family:inherit}
  .chip.on{background:var(--lime-dark);border-color:var(--lime-dark);color:#0f2000}
  .gchip{border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;font-size:13px;font-weight:900;padding:11px;text-align:right;cursor:pointer;width:100%;transition:all .15s;font-family:inherit}
  .gchip.on{background:var(--lime-dark);border-color:var(--lime-dark);color:#0f2000}
  /* ── FIX: inputs are NOT re-rendered on every keystroke ── */
  .inp{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.35);color:#fff;font-size:15px;padding:12px 13px;outline:none;margin-top:5px;font-family:inherit}
  .inp:focus{border-color:var(--lime-dark)}
  .fsel{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:#080c1a;color:#fff;font-size:13px;padding:12px 13px;outline:none;appearance:none;margin-top:5px;font-family:inherit}
  .fsel:focus{border-color:var(--lime-dark)}
  .note{border-radius:11px;border:1px solid rgba(34,211,238,.15);background:rgba(34,211,238,.07);padding:9px 12px;font-size:11px;color:rgba(255,255,255,.6);line-height:1.6;margin:9px 0}
  .bnote{border-radius:11px;border:1px solid rgba(250,204,21,.2);background:rgba(250,204,21,.07);padding:9px 12px;font-size:11px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:9px}
  .consent{display:flex;align-items:flex-start;gap:10px;background:rgba(0,0,0,.2);border-radius:12px;padding:12px;font-size:11px;line-height:1.75;color:rgba(255,255,255,.65);margin-top:11px;cursor:pointer}
  .consent input{margin-top:3px;accent-color:var(--lime-dark);width:16px;height:16px;flex-shrink:0}
  .bigicon{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;margin:10px auto 16px}
  .bi-g{background:linear-gradient(135deg,var(--lime-dark),var(--cyan))}
  .bi-l{background:rgba(163,230,53,.12);border:2px solid rgba(163,230,53,.3)}
  .rbar{margin-bottom:9px}
  .rbar-top{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:3px}
  .rbar-track{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
  .rbar-fill{height:100%;background:linear-gradient(to left,var(--lime-dark),var(--cyan));border-radius:99px}
  .btn-p{width:100%;padding:15px;border-radius:14px;background:linear-gradient(to left,var(--lime-dark),var(--cyan));color:#061000;font-size:17px;font-weight:900;border:none;cursor:pointer;margin-top:13px;font-family:inherit;transition:transform .15s}
  .btn-p:active{transform:scale(.98)}
  .btn-p:disabled{opacity:.35;cursor:not-allowed;background:rgba(255,255,255,.2);color:rgba(255,255,255,.72)}
  .back-btn{position:fixed;bottom:18px;left:16px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);transition:background .2s}
.back-btn:active{background:rgba(255,255,255,.2)}
.btn-s{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-weight:900;cursor:pointer;margin-top:9px;font-family:inherit;transition:transform .15s}
  .btn-s:active{transform:scale(.98)}
.city-inp{width:100%;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:15px;font-family:inherit;direction:rtl;margin-bottom:4px;box-sizing:border-box}
.city-inp:focus{outline:none;border-color:rgba(163,230,53,.5)}
.city-inp::placeholder{color:rgba(255,255,255,.65)}
.city-ac{background:#1a1640;border:1px solid rgba(99,102,241,.4);border-radius:10px;max-height:160px;overflow-y:auto;margin-bottom:8px;display:none}
.city-ac div{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06)}
.city-ac div:hover,.city-ac div:active{background:rgba(163,230,53,.1);color:#a3e635}
</style>
</head>
<body>
<div id="app"></div>
<script>
var step = 0;
var returnToEnd = false;
// State for non-input fields (re-rendered safely)
var S = {party:'', age:'', gender:'', city:'', compass:'', agree:true, updates:true, agree_id4:true, f1:'', f2:'', f3:'', prev:''};
// Separate state for text inputs - NOT touched by render()
var T = {id4:'', id4Skipped:false, phone:'', lat:'', lng:'', locOk:false, locStatus:'idle', pushStatus:'idle'};

var PARTIES = ["הליכוד (נתניהו)","ביחד (בנט ולפיד)","ישר (איזנקוט)","עוצמה יהודית (בן גביר)","ש״ס (דרעי)","ישראל ביתנו (ליברמן)","הדמוקרטים (יאיר גולן)","יהדות התורה","רע״ם","חד״ש-תע״ל","הציונות הדתית (סמוטריץ׳)","בל״ד","כחול לבן (גנץ)","מילואימניקים (הנדל)","לא החלטתי","לא אצביע"];
var FORECAST = ["הליכוד","ביחד","ישר","עוצמה יהודית","ש״ס","ישראל ביתנו","הדמוקרטים","יהדות התורה","רע״ם","חד״ש-תע״ל","הציונות הדתית"];
var PREV = ["הליכוד – 32 מנדטים","יש עתיד – 24 מנדטים","הציונות הדתית ועוצמה יהודית – 14 מנדטים","המחנה הממלכתי – 12 מנדטים","ש״ס – 11 מנדטים","יהדות התורה – 7 מנדטים","ישראל ביתנו – 6 מנדטים","רע״ם – 5 מנדטים","חד״ש-תע״ל – 5 מנדטים","מפלגת העבודה – 4 מנדטים","מרצ – לא עברה","בל״ד – לא עברה","כלכלה – לא עברה","לא הצבעתי"];
var AGES = ["18–24","25–34","35–44","45–59","60+"];
var GENDERS = ["גבר","אישה","אחר / מעדיף לא לציין"];
var CITIES = ["אבו גוש","אבו סנאן","אום אל-פחם","אופקים","אור יהודה","אור עקיבא","אורנית","אילת","אכסאל","אל-בטוף","אל-טייבה","אל-טירה","אלעד","אעבלין","אפרת","אריאל","אשדוד","אשקלון","באקה אל-גרביה","באר יעקב","באר שבע","בית דגן","בית שאן","בית שמש","בני ברק","בני עי״ש","בת ים","ג׳לג׳וליה","גבעת שמואל","גבעתיים","גדרה","גן יבנה","דאלית אל-כרמל","דימונה","הוד השרון","הרצליה","זכרון יעקב","חדרה","חולון","חיפה","טבריה","טייבה","טירה","טירת כרמל","טמרה","יבנה","יהוד-מונוסון","יוקנעם עילית","ירושלים","כפר יונה","כפר מנדא","כפר סבא","כפר קאסם","כרמיאל","לוד","מגדל העמק","מודיעין-מכבים-רעות","מזכרת בתיה","מעלה אדומים","מעלות-תרשיחא","נהריה","נס ציונה","נצרת","נצרת עילית","נשר","נתיבות","נתניה","סח׳נין","עכו","עפולה","עראבה","ערד","פתח תקווה","צפת","קלנסווה","קריית אונו","קריית אתא","קריית ביאליק","קריית גת","קריית ים","קריית מוצקין","קריית מלאכי","קריית שמונה","ראש העין","ראשון לציון","רהט","רחובות","רמות השבים","רמלה","רמת גן","רמת השרון","שדרות","שעב","תל אביב-יפו","תל מונד","אחר"];
var R22 = [{n:"הליכוד",s:32},{n:"יש עתיד",s:24},{n:"הציונות הדתית ועוצמה יהודית",s:14},{n:"המחנה הממלכתי",s:12},{n:"ש״ס",s:11},{n:"יהדות התורה",s:7},{n:"ישראל ביתנו",s:6},{n:"רע״ם",s:5},{n:"חד״ש-תע״ל",s:5},{n:"העבודה",s:4},{n:"מרצ",s:0},{n:"בל״ד",s:0},{n:"כלכלה",s:0}];
var LIVE = [{n:"הליכוד",s:32,c:"#818cf8"},{n:"יש עתיד",s:24,c:"#22d3ee"},{n:"הציונות הדתית",s:14,c:"#4ade80"},{n:"המחנה הממלכתי",s:12,c:"#a3e635"},{n:"ש״ס",s:11,c:"#fb923c"},{n:"יהדות התורה",s:7,c:"#c084fc"},{n:"ישראל ביתנו",s:6,c:"#60a5fa"},{n:"רע״ם",s:5,c:"#34d399"},{n:"חד״ש-תע״ל",s:5,c:"#f43f5e"},{n:"העבודה",s:4,c:"#f472b6"},{n:"מרצ",s:0,c:"#475569"}];


function card(i, e) { return '<div class="card"' + (e ? ' style="' + e + '"' : '') + '>' + i + '</div>'; }
function btnP(t, fn, dis) { return '<button class="btn-p"' + (dis ? ' disabled' : '') + ' onclick="' + fn + '">' + t + ' ›</button>'; }
function btnSec(t, fn) { return '<button class="btn-s" onclick="' + fn + '">' + t + '</button>'; }

function hdr() {
  if (step === 0) return '';
  var prog = Math.round((step / 9) * 100);
  return '<div class="hdr">'
    + '<div style="display:flex;align-items:center;gap:7px"><div class="hdr-logo">הסקר של המדינה ✓</div><span style="font-size:22px">🇮🇱</span></div>'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + '<span style="font-size:11px;color:rgba(255,255,255,.75)">' + (Math.min(step, 9) + 1) + ' / 10</span>'
    + '</div></div>'
    + '<div class="prog-wrap"><div class="prog-fill" style="width:' + prog + '%"></div></div>';
}

function globalFooter() {
  return '<div style="text-align:center;padding:20px 16px 32px;font-size:12px;color:rgba(255,255,255,.8);line-height:2.2;border-top:1.5px solid rgba(255,255,255,.25);margin-top:8px">'
    + '<img src="https://gilboashlomo-code.github.io/HASEKER-/RTV-LOGO.png" style="width:110px;display:block;margin:0 auto 12px;background:#fff;border-radius:8px;padding:6px;opacity:.92" onerror="this.style.display=\'none\'">'

function getHourRange() {
  var h = new Date().getHours();
  if (h >= 0  && h < 6)  return {min:3,   max:15};
  if (h >= 6  && h < 9)  return {min:15,  max:80};
  if (h >= 9  && h < 14) return {min:80,  max:400};
  if (h >= 14 && h < 18) return {min:200, max:600};
  if (h >= 18 && h < 23) return {min:400, max:850};
  return {min:50, max:200};
}

  // ── מונה משתתפים כולל ──

    var base = 12574;

    // כל כניסה מוסיפה 5
    COUNT = base + 5;
    try { localStorage.setItem('hsk_c', COUNT); } catch(e) {}
  }
  var el = document.getElementById('pcount');
  if (el) el.textContent = COUNT.toLocaleString('he-IL');
}

function bindId4Input() {
  var id4el = document.getElementById('inp-id4');
  var cbel  = document.getElementById('inp-agree-id4');
  function upd() {
    var btn = document.getElementById('id4-submit-btn');
    if (btn) btn.disabled = !(/^\d{4}$/.test(T.id4) && S.agree_id4);
  }
  if (id4el) {
    id4el.value = T.id4;
    id4el.addEventListener('input', function() {
      T.id4 = this.value.replace(/\D/g,'').slice(0,4);
      this.value = T.id4;
      upd();
    });
  }
  if (cbel) {
    cbel.checked = !!S.agree_id4;
    cbel.addEventListener('change', function() {
      S.agree_id4 = this.checked;
      upd();
    });
  }
}

function skipId4() {
  T.id4 = '';
  T.id4Skipped = true;
  go();

function requestPush() {
  if (!('Notification' in window)) { T.pushStatus = 'unsupported'; render(); return; }
  if (Notification.permission === 'granted') { T.pushStatus = 'granted'; render(); return; }
  if (Notification.permission === 'denied') { T.pushStatus = 'blocked'; render(); return; }
  Notification.requestPermission().then(function(p) {
    T.pushStatus = p === 'granted' ? 'granted' : 'denied';
    render();
  });
}

/* ── Geolocation handling ── */
function requestLocation() {
  if (!navigator.geolocation) { T.locStatus = 'error'; render(); return; }
  T.locStatus = 'requesting'; render();
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      T.lat = pos.coords.latitude.toFixed(6);
      T.lng = pos.coords.longitude.toFixed(6);
      T.locOk = true;
      T.locStatus = 'ok';
      render();
    },
    function(err) {
      T.locOk = false;
      if (err && err.code === 1) {                 // PERMISSION_DENIED
        T.locStatus = isInAppBrowser() ? 'inapp' : 'denied';
      } else {
        T.locStatus = 'error';
      }
      render();
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function isInAppBrowser() {
  return /WhatsApp|FBAN|FBAV|FB_IAB|Instagram|Line\/|MicroMessenger|Twitter|TikTok/i.test(navigator.userAgent || '');
}

function copyLink() {
  var url = window.location.href;
  var done = function(){ var b = document.getElementById('copy-btn'); if (b) b.textContent = 'הקישור הועתק ✓'; };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(function(){ window.prompt('העתק/י את הקישור:', url); });
  } else {
    window.prompt('העתק/י את הקישור:', url);
  }
}

function saveId4Final() {
  var el = document.getElementById('inp-id4-final');
  if (el && /^\d{4}$/.test(el.value)) {
    T.id4 = el.value;
    T.id4Skipped = false;
    render();
  }
}

function go()  {
  // חזרה משדה חסר → ישר לעמוד הסיום
  if (returnToEnd) {
    returnToEnd = false;
    step = 9;
    render();
    return;
  }
  step = Math.min(9, step + 1);
  // שמירה הדרגתית: אחרי שלב 2 (פרטים+טלפון) וכל שלב אחריו
  if (step >= 3 && T.phone) savePartial();
  // בכניסה למסך הסיום - שולחים את ההגשה פעם אחת בלבד
  if (step === 9) submitSurvey();
  render();
}

// ── צינור שמירה ──────────────────────────────────────────────
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycby8q-vpxg8iIaDNUwZ4z9BNp95sw6r_ooR3CTEWtb7x1bInSaaMWbnJE1MH-a47ZFyC/exec';
var SUBMITTED = false;
var SESSION_ID = 'S' + Date.now() + Math.random().toString(36).slice(2,7);

function buildRow() {
  function ref() {
    try { return new URLSearchParams(window.location.search).get('ref') || ''; }
    catch (e) { return ''; }
  }
  return {
    session_id: SESSION_ID,
    timestamp:  new Date().toISOString(),
    party:      S.party || '',
    age:        S.age || '',
    gender:     S.gender || '',
    city:       S.city || '',
    compass:    S.compass || '',
    id4:        T.id4 ? String(T.id4) : '',
    phone:      T.phone || '',
    forecast1:  S.f1 || '',
    forecast2:  S.f2 || '',
    forecast3:  S.f3 || '',
    prev_vote:  S.prev || '',
    lat:        T.lat || '',
    lng:        T.lng || '',
    updates:    S.updates ? 'כן' : 'לא',
    referrer:   ref(),
    status:     'חלקי'
  };
}

function savePartial() {
  if (!T.phone) return;
  var row = buildRow();
  if (SHEETS_URL && SHEETS_URL.indexOf('PASTE_') !== 0) {
    fetch(SHEETS_URL, { method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(row) }).catch(function(){});
  }
  try {
    var arr = JSON.parse(localStorage.getItem('hsk_rows')||'[]');
    var idx = -1;
    for (var i=0;i<arr.length;i++) { if (arr[i].session_id===SESSION_ID){idx=i;break;} }
    if (idx >= 0) arr[idx] = row; else arr.push(row);
    localStorage.setItem('hsk_rows', JSON.stringify(arr));
  } catch(e){}
}

function saveLocalBackup(row) {
  // גיבוי מקומי - מאפשר ייצוא CSV ידני גם בלי חיבור
  try {
    var arr = JSON.parse(localStorage.getItem('hsk_rows') || '[]');
    arr.push(row);
    localStorage.setItem('hsk_rows', JSON.stringify(arr));
  } catch (e) {}
}

function submitSurvey() {
  if (SUBMITTED) return;
  SUBMITTED = true;
  var row = buildRow();
  row.status = 'הושלם';
  saveLocalBackup(row);
  if (!SHEETS_URL || SHEETS_URL.indexOf('PASTE_') === 0) {
    console.log('SHEETS_URL לא הוגדר - נשמר רק מקומית:', row);
    return;
  }
  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(row)
  }).catch(function (e) { console.error('שגיאת שליחה (נשמר מקומית):', e); });
}

// ייצוא ידני של הגיבוי המקומי כקובץ CSV - הקלד exportLocalCSV() בקונסול
function exportLocalCSV() {
  var arr = [];
  try { arr = JSON.parse(localStorage.getItem('hsk_rows') || '[]'); } catch (e) {}
  if (!arr.length) { console.log('אין נתונים מקומיים'); return; }
  var cols = ['timestamp','party','age','gender','city','compass','id4','phone','forecast1','forecast2','forecast3','prev_vote','lat','lng','updates','referrer'];
  var lines = [cols.join(',')];
  arr.forEach(function (r) {
    lines.push(cols.map(function (c) {
      var v = (r[c] == null ? '' : String(r[c])).replace(/"/g, '""');
      return /[",\n]/.test(v) ? '"' + v + '"' : v;
    }).join(','));
  });
  var blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'haseker_export.csv';
  a.click();
}
function back() { if (step > 0) { step = step - 1; render(); } }
function rst() { step = 0; S = {party:'',age:'',gender:'',city:'',compass:'',agree:true,updates:true,agree_id4:true,f1:'',f2:'',f3:'',prev:''}; T = {id4:'',id4Skipped:false,phone:'',lat:'',lng:'',locOk:false,locStatus:'idle',pushStatus:'idle'}; render(); }
function ss(k, v) { S[k] = v; render(); }

render();
